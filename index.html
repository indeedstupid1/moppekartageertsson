<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>MoppeKart</title>
    <meta
      name="description"
      content="Kartapp för mopedrutter med stöd för klass 1, klass 2 och A-traktor/EPA."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="map-stage">
        <div id="map" aria-label="Karta"></div>

        <div class="map-overlay map-overlay-top">
          <div class="status-chip is-hidden" id="status-chip">
            <span class="status-dot"></span>
            <span id="status-text"></span>
          </div>
        </div>

        <button class="return-button is-hidden" id="return-button" type="button">
          Återgå till din plats
        </button>
      </main>

      <div class="panel-backdrop" id="panel-backdrop"></div>

      <aside class="control-panel is-open" id="control-panel">
        <button class="panel-toggle" id="panel-toggle" type="button" aria-label="Visa eller dölj panelen">
          <span id="panel-toggle-icon">‹</span>
        </button>

        <div class="panel-scroll">
          <header class="hero-card">
            <p class="eyebrow">Telefonläge</p>
            <h1>MoppeKart</h1>
          </header>

          <section class="card compact-card">
            <p class="section-kicker">Karta</p>
            <div class="style-toggle" id="style-toggle">
              <button class="toggle-chip is-active" data-style="street">Vanlig karta</button>
              <button class="toggle-chip" data-style="satellite">Satellit</button>
            </div>
          </section>

          <section class="card compact-card">
            <p class="section-kicker">Fordon</p>
            <div class="vehicle-toggle" id="vehicle-toggle" role="tablist">
              <button class="toggle-chip is-active" data-vehicle="class1">Moped klass 1</button>
              <button class="toggle-chip" data-vehicle="class2">Moped klass 2</button>
              <button class="toggle-chip" data-vehicle="atraktor">A-traktor / EPA</button>
            </div>
          </section>

          <section class="card">
            <div class="section-head section-head-tight">
              <div>
                <p class="section-kicker">Start</p>
                <h2>Varifrån?</h2>
              </div>
            </div>

            <div class="mode-switch" id="start-mode">
              <button class="mode-button is-active" data-mode="current">Nuvarande plats</button>
              <button class="mode-button" data-mode="manual">Skriv startadress</button>
            </div>

            <div class="collapsible" id="manual-start-wrap">
              <div class="field-group field-group-first">
                <label for="start-input">Startadress</label>
                <div class="input-row">
                  <input
                    id="start-input"
                    type="text"
                    placeholder="Högbergsgatan 8, Stockholm"
                    autocomplete="street-address"
                    disabled
                  />
                  <button class="ghost-button" id="pick-start" type="button">Tryck</button>
                </div>
                <div class="suggestions" id="start-suggestions"></div>
              </div>
            </div>

            <div class="field-group">
              <label for="end-input">Till</label>
              <div class="input-row">
                <input
                  id="end-input"
                  type="text"
                  placeholder="Skriv exakt adress"
                  autocomplete="street-address"
                />
                <button class="ghost-button" id="pick-end" type="button">Tryck</button>
              </div>
              <div class="suggestions" id="end-suggestions"></div>
            </div>

            <div class="action-row single-action">
              <button class="secondary-button" id="clear-button" type="button">Rensa</button>
            </div>
          </section>

          <section class="card result-card">
            <div class="section-head section-head-tight">
              <div>
                <p class="section-kicker">Rutt</p>
                <h2>Översikt</h2>
              </div>
              <button class="secondary-button" id="start-navigation" type="button" disabled>
                Börja rutt
              </button>
            </div>

            <div class="stats-grid stats-grid-two">
              <article class="stat-box">
                <span>Distans</span>
                <strong id="distance-output">-</strong>
              </article>
              <article class="stat-box">
                <span>ETA</span>
                <strong id="eta-output">-</strong>
              </article>
            </div>

            <div class="summary-note" id="summary-note" data-tone="info">
              Välj start och destination.
            </div>
          </section>
        </div>
      </aside>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./app.js"></script>
  </body>
</html>
